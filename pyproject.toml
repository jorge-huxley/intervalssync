[project]
name = "igpsport-intervals"
version = "0.1.0"
description = "Export cycling activities from iGPSPORT and upload them to intervals.icu"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.13"
dependencies = [
    "flet>=0.28",
    "flet-secure-storage>=0.85.2",
    "platformdirs>=4.0",
    "requests>=2.33.1",
]

[project.gui-scripts]
igpsync-gui = "igpsync.gui.app:main"

[dependency-groups]
dev = ["pytest>=8"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/igpsync"]

[tool.flet]
# Used by `flet build`. The product name shown to end users.
product = "iGPSPORT to intervals.icu"
company = "igpsport-intervals"
