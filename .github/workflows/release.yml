# Builds the Windows app and the Android APK, then publishes them as a single
# GitHub Release.
#
# It runs only when you push a version tag like "v0.1.0" — see how to do that
# in the README's "Cutting a release" section. The two build jobs upload their
# artifacts; a final release job attaches them to one release and generates the
# notes once (so they aren't duplicated).

name: Release

on:
  push:
    tags:
      - "v*" # any tag starting with v, e.g. v0.1.0, v1.2.3

# The automatic GITHUB_TOKEN needs write access to create the Release.
permissions:
  contents: write

env:
  PYTHONUTF8: "1" # make Python use UTF-8 everywhere (our progress text uses •, ↷, …)
  FLET_CLI_NO_RICH_OUTPUT: "1" # plain, log-friendly output from `flet build`

jobs:
  windows:
    runs-on: windows-latest # ships with Visual Studio 2022 + C++
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      # The git tag is the single source of truth for the version. Strip the
      # leading "v" (v0.2.1 -> 0.2.1) for flet's x.y.z build-version.
      - name: Compute version from tag
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Stamp it into the app so the in-app About dialog shows the real version.
      - name: Stamp version into the app
        shell: bash
        run: echo "__version__ = \"$APP_VERSION\"" > src/intervalssync/_version.py

      - name: Stamp Dropbox app key into the app
        shell: pwsh
        env:
          IGPSYNC_DROPBOX_APP_KEY: ${{ secrets.IGPSYNC_DROPBOX_APP_KEY }}
        run: |
          python -c "from pathlib import Path; import os; Path('src/intervalssync/_dropbox_app_key.py').write_text('DROPBOX_APP_KEY = ' + repr(os.getenv('IGPSYNC_DROPBOX_APP_KEY', '')) + '\n', encoding='utf-8')"

      - name: Build Windows app
        run: uv run flet build windows --yes --verbose --build-version "${{ env.APP_VERSION }}"

      # Name the zip after the tag, e.g. intervalssync-v0.2.0-windows.zip
      - name: Package into a versioned zip
        shell: pwsh
        run: Compress-Archive -Path build/windows/* -DestinationPath "intervalssync-${{ github.ref_name }}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: "intervalssync-${{ github.ref_name }}-windows.zip"

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Compute version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Stamp version into the app
        run: echo "__version__ = \"$APP_VERSION\"" > src/intervalssync/_version.py

      - name: Stamp Dropbox app key into the app
        env:
          IGPSYNC_DROPBOX_APP_KEY: ${{ secrets.IGPSYNC_DROPBOX_APP_KEY }}
        run: |
          python -c "from pathlib import Path; import os; Path('src/intervalssync/_dropbox_app_key.py').write_text('DROPBOX_APP_KEY = ' + repr(os.getenv('IGPSYNC_DROPBOX_APP_KEY', '')) + '\n', encoding='utf-8')"

      # Use a stable release key if the keystore secrets are configured, so every
      # release shares one signature and Android installs updates over the top
      # (no uninstall). Without the secrets, flet falls back to a debug key.
      - name: Configure APK signing (if keystore secret is set)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            {
              echo "FLET_ANDROID_SIGNING_KEY_STORE=$RUNNER_TEMP/release.jks"
              echo "FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD=$KEYSTORE_PASSWORD"
              echo "FLET_ANDROID_SIGNING_KEY_PASSWORD=$KEYSTORE_PASSWORD"
              echo "FLET_ANDROID_SIGNING_KEY_ALIAS=$KEY_ALIAS"
            } >> "$GITHUB_ENV"
            echo "Release signing configured."
          else
            echo "No keystore secret set — APK will be debug-signed."
          fi

      # flet build apk auto-installs the Flutter/Android SDK + JDK on first run.
      # It picks up the FLET_ANDROID_SIGNING_* env vars set above when present.
      - name: Build Android APK
        run: uv run flet build apk --yes --verbose --build-version "${{ env.APP_VERSION }}"

      - name: Rename APK with the version
        run: mv build/apk/*.apk "intervalssync-${{ github.ref_name }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: "intervalssync-${{ github.ref_name }}-android.apk"

  release:
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # Create (or update) the Release for this tag, attach both files, and
      # generate the notes a single time (avoids the duplicate notes you get
      # when each build job generates them).
      #
      # Tags with a hyphen (e.g. v0.3.0-rc1) are marked as pre-releases: GitHub
      # keeps the last stable as "Latest", the in-app update check (which uses
      # the /releases/latest API) ignores them, and they aren't offered to users.
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
